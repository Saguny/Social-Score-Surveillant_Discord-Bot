<div class="app">
    <app-overlay></app-overlay>
    <div class="side-bar">
        <h1 class="app-title"><a (click)="selectMenu()" [routerLink]="['/']">Social Credit<br>Surveillant</a></h1>
        <div class="side-bar-elements">
            <div class="side-bar-links">
                <a id="link-dashboard" [routerLink]="['/dashboard']" (click)="selectMenu('dashboard')">{{ dashboardMenu
                    }}</a>
                <a id="link-leaderboard" [routerLink]="['/leaderboard']" (click)="selectMenu('leaderboard')">{{
                    leaderboardMenu }}</a>
                <!-- falls logged in dann loginnamen anzeigen -->
                <a (click)="this.overlay.showOverlay('info', 'Login Required', 'Please log in to access this feature.');">Login</a>
            </div>
            <div class="side-bar-infos">
                <span><a (click)="this.overlay.showOverlay('theme', 'theme', 'theme');">Theme</a></span>
                <span><a [routerLink]="['terms']" (click)="selectMenu()">Terms of Service</a> ★ <a
                        [routerLink]="['about']" (click)="selectMenu()">About</a></span>
                <span><a (click)="selectMenu()" (click)="this.overlay.showOverlay('link', 'Source Code', '', 'https://github.com/Saguny/Social-Score-Surveillant_Discord-Bot');">Source Code</a> ★ <a (click)="selectMenu()" [routerLink]="['privacy']">Privacy
                        Policy</a></span>
                <span>Made with &lt;3 by OFF-BY-ONE</span>
            </div>
        </div>
    </div>
    <router-outlet></router-outlet>
</div>
