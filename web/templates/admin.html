<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Console · Social Credit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/admin.css?v=4">
</head>
<body>

<nav class="navbar px-4 py-3 mb-4">
  <span class="navbar-brand">中华人民共和国 &nbsp;&middot;&nbsp; SOCIAL CREDIT DASHBOARD</span>
  <div class="d-flex gap-3 align-items-center">
    <a class="nav-link" href="/">STATS</a>
    <a class="nav-link active" href="/admin">ADMIN</a>
    <a class="nav-link" href="/privacy">PRIVACY</a>
  </div>
</nav>

<div class="container px-4" style="max-width:860px">

  <div id="token-gate" style="display:block">

    <div class="shdr">Output</div>
    <div class="mb-3">
      <div id="terminal"><span class="t-prompt">Ready.</span></div>
    </div>

    <div class="shdr d-flex justify-content-between align-items-center">
      <span>Top.gg Votes</span>
      <div class="btn-group" role="group" id="vote-period-group">
        <button class="btn btn-run btn-sm px-3" data-period="1D" onclick="loadVoteChart('1D')">1D</button>
        <button class="btn btn-run btn-sm px-3" data-period="7D" onclick="loadVoteChart('7D')">7D</button>
        <button class="btn btn-run btn-sm px-3" data-period="1M" onclick="loadVoteChart('1M')">1M</button>
        <button class="btn btn-run btn-sm px-3" data-period="TOTAL" onclick="loadVoteChart('TOTAL')">TOTAL</button>
      </div>
    </div>
    <div class="card-panel p-4 mb-3 chart-card">
      <div id="vote-total" class="lbl" style="margin-bottom:8px"></div>
      <canvas id="vote-chart" height="90"></canvas>
    </div>

    <div class="shdr">User Lookup &amp; Yuan Adjustment</div>
    <div class="card-panel p-4 mb-3">
      <div class="row g-2 align-items-end mb-3">
        <div class="col-auto">
          <label class="form-label">User ID</label>
          <input type="text" id="ul-user-id" class="form-control" placeholder="123456789012345678" style="width:240px">
        </div>
        <div class="col-auto">
          <button class="btn btn-run px-4" onclick="lookupUser()">LOOKUP</button>
        </div>
      </div>
      <div id="ul-result" style="font-size:.85rem"></div>
    </div>

    <div class="shdr">Embed Broadcaster</div>
    <div class="card-panel p-4 mb-3">

      <div class="row g-3">
        <div class="col-md-7">
          <div class="mb-2">
            <label class="form-label">Title</label>
            <input type="text" id="eb-title" class="form-control" placeholder="Official Decree" maxlength="256" oninput="renderEmbedPreview()">
          </div>
          <div class="mb-2">
            <label class="form-label">Description</label>
            <textarea id="eb-desc" class="form-control" rows="4" maxlength="4096" placeholder="Embed body text" oninput="renderEmbedPreview()"></textarea>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-4">
              <label class="form-label">Color</label>
              <input type="color" id="eb-color" class="form-control" value="#cc0000" oninput="renderEmbedPreview()" style="height:38px">
            </div>
            <div class="col-4">
              <label class="form-label">Image URL</label>
              <input type="text" id="eb-image" class="form-control" placeholder="https://..." oninput="renderEmbedPreview()">
            </div>
            <div class="col-4">
              <label class="form-label">Thumbnail URL</label>
              <input type="text" id="eb-thumb" class="form-control" placeholder="https://..." oninput="renderEmbedPreview()">
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label">Fields</label>
            <div id="eb-fields"></div>
            <button class="btn btn-run btn-sm px-3 mt-1" onclick="addEmbedField()">+ ADD FIELD</button>
          </div>

          <div class="row g-2 mb-2">
            <div class="col-5">
              <label class="form-label">Button Label</label>
              <input type="text" id="eb-btn-label" class="form-control" placeholder="Join Server" maxlength="80" oninput="renderEmbedPreview()">
            </div>
            <div class="col-7">
              <label class="form-label">Button URL</label>
              <input type="text" id="eb-btn-url" class="form-control" placeholder="https://discord.gg/..." oninput="renderEmbedPreview()">
            </div>
          </div>

          <div class="row g-2 align-items-end mt-3">
            <div class="col-7">
              <label class="form-label">Send to</label>
              <select id="eb-target" class="form-select" onchange="toggleDmTargetInput()">
                <option value="all">All servers</option>
                <option value="dm">DM a specific user</option>
              </select>
              <div id="eb-dm-userid-wrap" style="display:none;margin-top:6px">
                <input type="text" id="eb-dm-userid" class="form-control form-control-sm" placeholder="User ID">
              </div>
            </div>
            <div class="col-auto">
              <button class="btn btn-danger-soft px-4" onclick="sendBroadcastEmbed()">SEND EMBED</button>
            </div>
          </div>
          <div id="eb-result" class="mt-2" style="font-size:.8rem;white-space:pre-wrap"></div>
        </div>

        <div class="col-md-5">
          <label class="form-label">Preview</label>
          <div id="eb-preview" class="embed-preview"></div>
          <div style="color:var(--text-faint);font-size:.7rem;margin-top:8px">
            Sends once, either to a channel @everyone can already write in, or directly to a user's DMs. The bot's standard footer is appended automatically.
          </div>
        </div>
      </div>
    </div>

    <div class="shdr">Console</div>
    <div class="card-panel p-4">

      <div class="cmd-section">
        <div class="row g-2 align-items-end">
          <div class="col-auto">
            <button class="btn btn-run px-4" onclick="run('sync')">SYNC SLASH COMMANDS</button>
          </div>
          <div class="col-auto">
            <button class="btn btn-run px-4" onclick="run('guilds')">LIST GUILDS</button>
          </div>
        </div>
      </div>

      <div class="cmd-section">
        <div class="row g-2 align-items-end">
          <div class="col-auto">
            <label class="form-label">Cog name</label>
            <input type="text" id="arg-cog" class="form-control" placeholder="cogs.scoring" style="width:200px">
          </div>
          <div class="col-auto">
            <button class="btn btn-run px-4" onclick="run('reload', [v('arg-cog')])">RELOAD COG</button>
          </div>
        </div>
      </div>

      <div class="cmd-section">
        <div class="row g-2 align-items-end">
          <div class="col-3">
            <label class="form-label">Guild ID</label>
            <input type="text" id="arg-fr-gid" class="form-control" placeholder="guild_id">
          </div>
          <div class="col-3">
            <label class="form-label">User ID</label>
            <input type="text" id="arg-fr-uid" class="form-control" placeholder="user_id">
          </div>
          <div class="col-auto">
            <button class="btn btn-run px-4" onclick="run('force_reset', [v('arg-fr-gid'), v('arg-fr-uid')])">FORCE RESET SCORE</button>
          </div>
        </div>
      </div>

      <div class="cmd-section">
        <div class="row g-2 align-items-end">
          <div class="col-3">
            <label class="form-label">Guild ID</label>
            <input type="text" id="arg-fy-gid" class="form-control" placeholder="guild_id">
          </div>
          <div class="col-3">
            <label class="form-label">User ID</label>
            <input type="text" id="arg-fy-uid" class="form-control" placeholder="user_id">
          </div>
          <div class="col-2">
            <label class="form-label">Amount</label>
            <input type="number" id="arg-fy-amt" class="form-control" placeholder="0" min="0">
          </div>
          <div class="col-auto">
            <button class="btn btn-run px-4" onclick="run('force_yuan', [v('arg-fy-gid'), v('arg-fy-uid'), v('arg-fy-amt')])">SET YUAN</button>
          </div>
        </div>
      </div>

      <div class="cmd-section">
        <div class="row g-2 align-items-end">
          <div class="col-3">
            <label class="form-label">Guild ID</label>
            <input type="text" id="arg-db-gid" class="form-control" placeholder="guild_id">
          </div>
          <div class="col-auto">
            <button class="btn btn-run btn-danger-soft px-4" onclick="run('db_reset', [v('arg-db-gid')])">DB RESET GUILD</button>
          </div>
        </div>
      </div>

      <div class="cmd-section">
        <div class="row g-2 align-items-end">
          <div class="col-auto">
            <button class="btn btn-danger-soft px-4" onclick="confirmRun('restart', [], 'Restart the bot?')">RESTART</button>
          </div>
          <div class="col-auto">
            <button class="btn btn-danger-soft px-4" onclick="confirmRun('shutdown', [], 'Shut down the bot?')">SHUTDOWN</button>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/static/admin.js?v=4"></script>
<script>
  loadVoteChart('7D');
  loadGuildListForBroadcast();
  renderEmbedFields();
  renderEmbedPreview();
</script>
</body>
</html>
