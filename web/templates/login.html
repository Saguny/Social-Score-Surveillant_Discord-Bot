<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login · Social Credit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="/static/login.css">
</head>
<body>
<div class="box">
  <div class="brand">中华人民共和国 · SOCIAL CREDIT</div>
  <form id="form">
    <input type="password" id="token" class="form-control mb-3" placeholder="Access token" autofocus autocomplete="current-password">
    <button type="submit" class="btn btn-login">ENTER</button>
    <div class="err" id="err">Invalid token.</div>
  </form>
</div>
<script src="/static/login.js"></script>
</body>
</html>
